  <!-- Left wing -->
  <g transform="translate(535,290) rotate(-15)">
    <path d="M0,0 C-8,-5 -36,-3 -40,12 C-36,26 -8,28 0,16 Z" fill="#00c47a" stroke="#1a2e1a" stroke-width="3" stroke-linejoin="round"/>
