  <line x1="622" y1="265" x2="622" y2="343" stroke="#005238" stroke-width="3" opacity="0.4"/>
  <!-- TENZO text -->
  <text x="600" y="306" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="20" fill="white" text-anchor="middle" dominant-baseline="middle" filter="url(#glow)">TENZO</text>
  <!-- Eyes -->
  <circle cx="584" cy="328" r="7" fill="rgba(0,40,0,0.75)"/>
  <circle cx="616" cy="328" r="7" fill="rgba(0,40,0,0.75)"/>
  <circle cx="586" cy="325" r="2.5" fill="white"/>
  <circle cx="618" cy="325" r="2.5" fill="white"/>
  <!-- Happy mouth -->
  <path d="M585 340 Q600 350 615 340" stroke="rgba(0,40,0,0.75)" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- TENZO FLAPPY title -->
  <text x="600" y="100" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="96" fill="#a8d878" text-anchor="middle" dominant-baseline="middle" filter="url(#textGlow)" letter-spacing="4">TENZO</text>
  <text x="600" y="175" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="68" fill="#ffffff" text-anchor="middle" dominant-baseline="middle" filter="url(#textGlow)" letter-spacing="8">FLAPPY</text>

  <!-- Tagline + URL -->
  <text x="600" y="575" font-family="Arial, sans-serif" font-weight="700" font-size="22" fill="rgba(255,255,255,0.75)" text-anchor="middle" dominant-baseline="middle" letter-spacing="3">BETTER EVERY DAY  •  play.tenzotea.co</text>
