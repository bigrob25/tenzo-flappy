<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8e8c0"/>
      <stop offset="100%" stop-color="#b0d4a8"/>
    </linearGradient>
    <linearGradient id="bagGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00a06a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#007853" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="stalkL" x1="0" y1="0" x2="1" y2="0">
